upstream api      { server api:8000; }
upstream frontend { server frontend:3000; }
server {
    listen 80;
    map $http_upgrade $connection_upgrade { default upgrade; '' close; }
    location /api/      { proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ws        { proxy_pass http://api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_read_timeout 3600s; }
    location /webhooks/ { proxy_pass http://api; proxy_set_header X-Real-IP $remote_addr; }
    location /          { proxy_pass http://frontend; proxy_set_header Host $host; }
}
