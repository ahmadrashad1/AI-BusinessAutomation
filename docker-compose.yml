version: '3.9'
services:
  db:
    image: pgvector/pgvector:pg16
    environment: { POSTGRES_DB: bpa_dev, POSTGRES_USER: bpa, POSTGRES_PASSWORD: bpa_dev_password }
    volumes: [pg_data:/var/lib/postgresql/data]
    ports: ['5432:5432']
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    ports: ['6379:6379']
  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
    volumes: [minio_data:/data]
    ports: ['9000:9000', '9001:9001']
  api:
    build: { context: ./backend, dockerfile: Dockerfile }
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ['./backend:/app']
    env_file: .env
    ports: ['8000:8000']
    depends_on: [db, redis, minio]
  worker:
    build: { context: ./backend, dockerfile: Dockerfile.worker }
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    volumes: ['./backend:/app']
    env_file: .env
    depends_on: [db, redis, minio]
  beat:
    build: { context: ./backend, dockerfile: Dockerfile.worker }
    command: celery -A worker.celery_app beat --loglevel=info
    env_file: .env
    depends_on: [redis]
  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    command: npm run dev
    volumes: ['./frontend:/app', '/app/node_modules']
    ports: ['3000:3000']
  flower:
    build: { context: ./backend, dockerfile: Dockerfile.worker }
    command: celery -A worker.celery_app flower --port=5555
    env_file: .env
    ports: ['5555:5555']
    depends_on: [redis]
  nginx:
    image: nginx:alpine
    volumes: ['./infra/nginx/conf.d:/etc/nginx/conf.d']
    ports: ['80:80']
    depends_on: [api, frontend]
volumes:
  pg_data:
  redis_data:
  minio_data:
